name: Docker CI

# Build the PriceIQ Docker image and verify the Streamlit app boots
# successfully on every push and pull request.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-smoke-test:
    name: Build image & startup check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: priceiq:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --rm \
            --name priceiq-ci \
            -p 8501:8501 \
            priceiq:ci

      - name: Wait for Streamlit health endpoint
        run: |
          echo "Polling http://localhost:8501/_stcore/health ..."
          for i in $(seq 1 40); do
            if curl -sfg http://localhost:8501/_stcore/health | grep -qi "ok"; then
              echo "Streamlit is healthy."
              exit 0
            fi
            echo "Attempt $i: not ready yet, sleeping 3s..."
            sleep 3
          done
          echo "Streamlit failed to become healthy in time."
          docker logs priceiq-ci || true
          exit 1

      - name: Verify home page responds
        run: |
          curl -sfI http://localhost:8501/ | head -n 1

      - name: Container logs (debug)
        if: always()
        run: docker logs priceiq-ci || true

      - name: Stop container
        if: always()
        run: docker stop priceiq-ci || true
